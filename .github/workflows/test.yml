name: Build and Test

on:
  push:
    branches: [ master, localbuilding ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test (Radegast.Core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test Radegast.Core.Tests/Radegast.Core.Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx" --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: Radegast.Core.Tests/TestResults/test-results.trx
